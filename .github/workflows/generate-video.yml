Réflexion durant 32s

Oui, il existe bien une solution propre sans abandonner MoviePy. Tu as raison de pousser là-dessus.

Le bug est simple : MoviePy 1.0.3 utilise encore Image.ANTIALIAS, alors que Pillow l’a supprimé dans ses versions récentes. Pillow indique que ANTIALIAS a été remplacé par LANCZOS / Resampling.LANCZOS.

Le vrai problème chez nous : le patch que je t’ai fait ajouter dans le gros script n’est visiblement pas exécuté au bon moment, ou pas dans l’environnement réellement lancé. La preuve : le log affiche encore python3.12 et MoviePy plante toujours avant de voir Image.ANTIALIAS.

La bonne correction MoviePy

On va créer un fichier spécial Python nommé :

sitecustomize.py

Python charge automatiquement ce fichier au démarrage s’il est dans le chemin d’exécution. Donc le patch sera appliqué avant que MoviePy ne s’exécute.

Ce que tu dois modifier

Dans ton workflow, cherche cette partie :

- name: Generate video
  run: |
    python generate_short.py

Remplace-la par ceci :

- name: Generate video
  run: |
    cat > sitecustomize.py <<'PY'
    from PIL import Image
    if not hasattr(Image, "ANTIALIAS"):
        Image.ANTIALIAS = Image.Resampling.LANCZOS
    PY

    python -c "from PIL import Image; print('ANTIALIAS disponible:', hasattr(Image, 'ANTIALIAS'))"
    PYTHONPATH="$PWD:$PYTHONPATH" python generate_short.py

Ensuite fais Commit changes et relance le workflow.

Pourquoi cette correction est meilleure

Elle ne dépend pas du fait que GitHub utilise Python 3.11 ou 3.12. Elle force Python à recréer Image.ANTIALIAS avant que MoviePy charge son module resize.py.

GitHub explique que actions/setup-python sert bien à installer une version spécifique de Python et l’ajouter au PATH, mais ici, au lieu de nous battre avec l’environnement exact, on corrige directement la compatibilité entre Pillow et MoviePy.

Donc oui : on garde MoviePy, mais on applique le patch globalement avec sitecustomize.py.

