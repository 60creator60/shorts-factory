name: Generate TikTok Short

on:
  workflow_dispatch:

jobs:
  generate-video:
    runs-on: ubuntu-latest

    env:
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl fonts-dejavu-core

      - name: Install Python dependencies
        run: |
          python --version
          python -m pip install --upgrade pip
          python -m pip install requests moviepy==1.0.3 pillow==9.5.0 numpy==1.26.4 imageio-ffmpeg piper-tts

      - name: Download French Piper voice
        run: |
          mkdir -p piper_voice
          curl -L "https://huggingface.co/rhasspy/piper-voices/resolve/main/fr/fr_FR/siwis/medium/fr_FR-siwis-medium.onnx" -o piper_voice/fr_FR-siwis-medium.onnx
          curl -L "https://huggingface.co/rhasspy/piper-voices/resolve/main/fr/fr_FR/siwis/medium/fr_FR-siwis-medium.onnx.json" -o piper_voice/fr_FR-siwis-medium.onnx.json
          ls -lh piper_voice

      - name: Patch MoviePy Pillow compatibility
        run: |
          python - <<'PY'
          from pathlib import Path
          import moviepy.video.fx.resize as resize

          path = Path(resize.__file__)
          text = path.read_text()
          text = text.replace(
              "Image.ANTIALIAS",
              "getattr(getattr(Image, 'Resampling', Image), 'LANCZOS')"
          )
          path.write_text(text)

          print("MoviePy patched:", path)
          PY

      - name: Create automatic video generator
        run: |
          cat > generate_short.py <<'PY'
          import os
          import json
          import math
          import time
          import random
          import subprocess
          from pathlib import Path

          import requests
          import numpy as np
          from PIL import Image, ImageDraw, ImageFont, ImageOps

          RESAMPLE_LANCZOS = getattr(getattr(Image, "Resampling", Image), "LANCZOS")

          if not hasattr(Image, "ANTIALIAS"):
              Image.ANTIALIAS = RESAMPLE_LANCZOS

          from moviepy.editor import (
              VideoFileClip,
              ImageClip,
              CompositeVideoClip,
              concatenate_videoclips,
              AudioFileClip,
              AudioClip,
              CompositeAudioClip,
          )
          from moviepy.audio.fx.all import audio_fadein, audio_fadeout, volumex

          WIDTH = 1080
          HEIGHT = 1920
          FPS = 30

          PEXELS_API_KEY = os.getenv("PEXELS_API_KEY", "").strip()
          PIXABAY_API_KEY = os.getenv("PIXABAY_API_KEY", "").strip()

          ROOT = Path(".").resolve()
          ASSETS = ROOT / "assets"
          VIDEOS = ASSETS / "videos"
          META = ASSETS / "metadata"
          BRANDING = ASSETS / "branding"
          OUTPUT = ROOT / "output"
          VOICES = OUTPUT / "voices"

          for folder in [ASSETS, VIDEOS, META, BRANDING, OUTPUT, VOICES]:
              folder.mkdir(parents=True, exist_ok=True)

          FINAL_MP4 = OUTPUT / "la_minute_culture_short.mp4"
          PUBLICATION_JSON = OUTPUT / "publication.json"
          COVER_PNG = OUTPUT / "cover.png"
          PROFILE_PNG = BRANDING / "profile.png"

          COVER_DURATION = 1.10
          SUBSCRIBE_OUTRO_DURATION = 1.15

          COVER = {
              "brand": "LA MINUTE CULTURE",
              "headline": "",
              "subline": "TOP 5",
          }

          PIPER_MODEL = ROOT / "piper_voice" / "fr_FR-siwis-medium.onnx"
          PIPER_CONFIG = ROOT / "piper_voice" / "fr_FR-siwis-medium.onnx.json"

          SCENES = [
              {
                  "id": "01_hook",
                  "min_duration": 3.8,
                  "title": "ENDROITS\nINTERDITS",
                  "subtitle": "Des lieux réels…\npresque impossibles d’accès.",
                  "voice_text": "Ces endroits sont réels… mais presque personne n’a le droit d’y entrer.",
                  "keywords": ["locked door", "security door", "dark corridor", "remote island"],
                  "color": (18, 18, 24),
              },
              {
                  "id": "02_promise",
                  "min_duration": 4.8,
                  "title": "TOP 5\nRÉELS",
                  "subtitle": "lieux interdits",
                  "voice_text": "Voici cinq lieux réels où l’accès est interdit, ultra limité, ou réservé à quelques personnes seulement.",
                  "keywords": ["world map dark", "map animation", "global locations"],
                  "color": (12, 22, 35),
              },
              {
                  "id": "03_number_5",
                  "min_duration": 8.5,
                  "title": "#5 ARCHIVES\nDU VATICAN",
                  "title2": "Chercheurs qualifiés\nseulement",
                  "subtitle": "Accès très encadré\npour les chercheurs.",
                  "voice_text": "Numéro cinq : les Archives apostoliques du Vatican. L’accès est surtout réservé à des chercheurs qualifiés, avec des règles très strictes.",
                  "keywords": ["old library", "archive shelves", "ancient books", "historical archive"],
                  "color": (70, 46, 25),
              },
              {
                  "id": "04_number_4",
                  "min_duration": 10.0,
                  "title": "#4 COFFRE\nÀ GRAINES",
                  "title2": "-18 °C\nsous l’Arctique",
                  "subtitle": "Des graines conservées\nau froid extrême.",
                  "voice_text": "Numéro quatre : le Svalbard Global Seed Vault. Dans une montagne arctique, plus d’un million d’échantillons de graines dorment à moins dix-huit degrés.",
                  "keywords": ["arctic mountain", "snow mountain", "ice tunnel", "frozen vault"],
                  "color": (20, 55, 84),
              },
              {
                  "id": "05_number_3",
                  "min_duration": 11.0,
                  "title": "#3 LASCAUX\nFERMÉE",
                  "title2": "Depuis\n1963",
                  "subtitle": "La vraie grotte\nn’accueille plus le public.",
                  "voice_text": "Numéro trois : Lascaux, en France. La vraie grotte est fermée au public depuis 1963, car l’humidité, la lumière et nos respirations menaçaient les peintures.",
                  "keywords": ["cave", "cave painting", "prehistoric art", "rock art"],
                  "color": (55, 34, 18),
              },
              {
                  "id": "06_number_2",
                  "min_duration": 10.5,
                  "title": "#2 ÎLE AUX\nSERPENTS",
                  "title2": "Accès\nultra limité",
                  "subtitle": "Une île protégée\nau large du Brésil.",
                  "voice_text": "Numéro deux : Queimada Grande, au Brésil. Là, on change de niveau : cette île protégée abrite une vipère endémique. Seules les autorités et certains chercheurs peuvent y accéder.",
                  "keywords": ["tropical island drone", "remote island", "viper snake", "jungle island"],
                  "color": (18, 65, 42),
              },
              {
                  "id": "07_number_1",
                  "min_duration": 14.0,
                  "title": "#1\nSURTSEY",
                  "title2": "Île\nlaboratoire",
                  "subtitle": "Même poser le pied\npeut fausser l’expérience.",
                  "voice_text": "Numéro un : Surtsey, en Islande. Cette île est née d’une éruption en 1963. Même poser le pied dessus peut fausser l’expérience scientifique : observer comment la vie colonise une terre neuve.",
                  "keywords": ["volcanic island", "black lava coast", "Iceland ocean", "volcanic rock"],
                  "color": (20, 23, 27),
              },
              {
                  "id": "08_question",
                  "min_duration": 3.8,
                  "title": "LEQUEL\nTU CHOISIS ?",
                  "subtitle": "À regarder…\nde très loin.",
                  "voice_text": "Lequel vous donne envie de regarder… de très loin ?",
                  "keywords": ["world map dark", "remote island", "mysterious place"],
                  "color": (16, 16, 22),
              },
          ]

          def log(message):
              print(f"[SHORTS-FACTORY] {message}")

          def download_file(url, path):
              try:
                  with requests.get(url, stream=True, timeout=60) as response:
                      response.raise_for_status()
                      with open(path, "wb") as file:
                          for chunk in response.iter_content(chunk_size=1024 * 1024):
                              if chunk:
                                  file.write(chunk)
                  return path.exists() and path.stat().st_size > 100000
              except Exception as error:
                  log(f"Download failed: {error}")
                  return False

          def search_pexels(query):
              if not PEXELS_API_KEY:
                  return None

              try:
                  response = requests.get(
                      "https://api.pexels.com/videos/search",
                      headers={"Authorization": PEXELS_API_KEY},
                      params={
                          "query": query,
                          "orientation": "portrait",
                          "per_page": 8,
                          "min_duration": 3,
                          "max_duration": 60,
                      },
                      timeout=30,
                  )

                  if response.status_code >= 400:
                      log(f"Pexels error {response.status_code}: {response.text[:150]}")
                      return None

                  videos = response.json().get("videos", [])
                  return videos[0] if videos else None

              except Exception as error:
                  log(f"Pexels search failed: {error}")
                  return None

          def best_pexels_url(video):
              files = video.get("video_files", [])
              if not files:
                  return None

              def score(file):
                  width = file.get("width", 0) or 0
                  height = file.get("height", 0) or 0
                  vertical_bonus = 1000000 if height >= width else 0
                  return vertical_bonus + width * height

              files = sorted(files, key=score, reverse=True)
              return files[0].get("link")

          def search_pixabay(query):
              if not PIXABAY_API_KEY:
                  return None

              try:
                  response = requests.get(
                      "https://pixabay.com/api/videos/",
                      params={
                          "key": PIXABAY_API_KEY,
                          "q": query,
                          "safesearch": "true",
                          "per_page": 8,
                      },
                      timeout=30,
                  )

                  if response.status_code >= 400:
                      log(f"Pixabay error {response.status_code}: {response.text[:150]}")
                      return None

                  hits = response.json().get("hits", [])
                  return hits[0] if hits else None

              except Exception as error:
                  log(f"Pixabay search failed: {error}")
                  return None

          def best_pixabay_url(hit):
              videos = hit.get("videos", {})

              for quality in ["large", "medium", "small", "tiny"]:
                  item = videos.get(quality)
                  if item and item.get("url"):
                      return item["url"]

              return None

          def get_scene_video(scene):
              path = VIDEOS / f"{scene['id']}.mp4"
              meta_path = META / f"{scene['id']}.json"

              if path.exists() and path.stat().st_size > 100000:
                  return path

              for query in scene["keywords"]:
                  log(f"Searching visual for {scene['id']}: {query}")

                  pexels = search_pexels(query)
                  if pexels:
                      url = best_pexels_url(pexels)
                      if url and download_file(url, path):
                          meta_path.write_text(json.dumps({
                              "source": "Pexels",
                              "query": query,
                              "id": pexels.get("id"),
                              "url": pexels.get("url"),
                          }, ensure_ascii=False, indent=2), encoding="utf-8")
                          return path

                  pixabay = search_pixabay(query)
                  if pixabay:
                      url = best_pixabay_url(pixabay)
                      if url and download_file(url, path):
                          meta_path.write_text(json.dumps({
                              "source": "Pixabay",
                              "query": query,
                              "id": pixabay.get("id"),
                              "pageURL": pixabay.get("pageURL"),
                              "tags": pixabay.get("tags"),
                              "user": pixabay.get("user"),
                          }, ensure_ascii=False, indent=2), encoding="utf-8")
                          return path

              log(f"No visual found for {scene['id']}. Using generated background.")
              return None

          def generate_scene_voice(scene):
              output_path = VOICES / f"{scene['id']}.wav"

              if output_path.exists() and output_path.stat().st_size > 10000:
                  return output_path

              command = [
                  "piper",
                  "--model", str(PIPER_MODEL),
                  "--config", str(PIPER_CONFIG),
                  "--output_file", str(output_path),
                  "--length_scale", "1.05",
                  "--sentence_silence", "0.22",
              ]

              subprocess.run(
                  command,
                  input=scene["voice_text"],
                  text=True,
                  check=True
              )

              return output_path

          def font(size):
              return ImageFont.truetype(
                  "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf",
                  size
              )

          def wrap_text_pixels(draw, text, current_font, max_width):
              words = text.replace("\n", " ").split()
              lines = []
              current = ""

              for word in words:
                  test = word if not current else current + " " + word
                  box = draw.textbbox((0, 0), test, font=current_font, stroke_width=8)
                  width = box[2] - box[0]

                  if width <= max_width:
                      current = test
                  else:
                      if current:
                          lines.append(current)
                      current = word

              if current:
                  lines.append(current)

              return "\n".join(lines)

          def multiline_center(
              draw,
              text,
              y,
              size,
              fill,
              stroke_fill=(0, 0, 0, 255),
              stroke_width=6,
              spacing_ratio=0.18,
              max_width=900
          ):
              current_font = font(size)
              text = wrap_text_pixels(draw, text, current_font, max_width)
              spacing = int(size * spacing_ratio)

              box = draw.multiline_textbbox(
                  (0, 0),
                  text,
                  font=current_font,
                  spacing=spacing,
                  stroke_width=stroke_width,
                  align="center"
              )

              text_w = box[2] - box[0]
              text_h = box[3] - box[1]
              x = (WIDTH - text_w) // 2

              draw.multiline_text(
                  (x, y),
                  text,
                  font=current_font,
                  fill=fill,
                  spacing=spacing,
                  align="center",
                  stroke_width=stroke_width,
                  stroke_fill=stroke_fill
              )

              return y + text_h

          def get_cover_headline():
              headline = str(COVER.get("headline", "")).strip()

              if headline:
                  return headline.upper()

              for scene in SCENES:
                  if scene.get("id") in ["02_promise", "02_promesse"]:
                      subtitle = str(scene.get("subtitle", "")).strip()
                      if subtitle:
                          return subtitle.upper()

              for scene in SCENES:
                  scene_id = str(scene.get("id", ""))
                  if scene_id.startswith("03_"):
                      title = str(scene.get("title", "")).replace("#5", "").strip()
                      if title:
                          return title.upper()

              return "TOP 5"

          def make_cover_png():
              brand = str(COVER.get("brand", "LA MINUTE CULTURE")).strip().upper()
              headline = get_cover_headline()
              subline = str(COVER.get("subline", "TOP 5")).strip().upper()

              image = Image.new("RGBA", (WIDTH, HEIGHT), (10, 10, 14, 255))
              draw = ImageDraw.Draw(image)

              for y in range(HEIGHT):
                  factor = y / HEIGHT
                  r = int(10 + factor * 8)
                  g = int(10 + factor * 10)
                  b = int(14 + factor * 18)
                  draw.line((0, y, WIDTH, y), fill=(r, g, b, 255))

              draw.ellipse((-180, 180, 280, 640), outline=(255, 210, 40, 120), width=8)
              draw.ellipse((800, 230, 1240, 670), outline=(255, 210, 40, 80), width=6)
              draw.ellipse((120, 1240, 980, 2100), outline=(255, 255, 255, 18), width=4)

              draw.rounded_rectangle(
                  (90, 350, WIDTH - 90, 1450),
                  radius=38,
                  fill=(0, 0, 0, 78),
                  outline=(255, 255, 255, 24),
                  width=2
              )

              multiline_center(
                  draw,
                  brand,
                  y=455,
                  size=82,
                  fill=(255, 215, 0, 255),
                  stroke_width=8,
                  max_width=920
              )

              pill_x1, pill_y1, pill_x2, pill_y2 = 350, 700, 730, 810

              draw.rounded_rectangle(
                  (pill_x1, pill_y1, pill_x2, pill_y2),
                  radius=30,
                  fill=(255, 215, 0, 255)
              )

              pill_font = font(56)
              pill_box = draw.textbbox((0, 0), subline, font=pill_font)
              pill_w = pill_box[2] - pill_box[0]
              pill_h = pill_box[3] - pill_box[1]

              draw.text(
                  ((WIDTH - pill_w) // 2, pill_y1 + ((pill_y2 - pill_y1 - pill_h) // 2) - 6),
                  subline,
                  font=pill_font,
                  fill=(0, 0, 0, 255)
              )

              multiline_center(
                  draw,
                  headline,
                  y=895,
                  size=118,
                  fill=(255, 255, 255, 255),
                  stroke_width=10,
                  max_width=890
              )

              signature = "1 minute • 1 dose de culture"
              sig_font = font(42)
              sig_box = draw.textbbox((0, 0), signature, font=sig_font)
              sig_w = sig_box[2] - sig_box[0]

              draw.text(
                  ((WIDTH - sig_w) // 2, 1350),
                  signature,
                  font=sig_font,
                  fill=(255, 215, 0, 220)
              )

              image.save(COVER_PNG)
              return COVER_PNG

          def make_cover_clip(duration=COVER_DURATION):
              cover_path = make_cover_png()

              clip = (
                  ImageClip(str(cover_path))
                  .set_duration(duration)
                  .resize(lambda t: 1.0 + 0.025 * (t / max(duration, 0.1)))
                  .crop(
                      x_center=WIDTH / 2,
                      y_center=HEIGHT / 2,
                      width=WIDTH,
                      height=HEIGHT
                  )
              )

              return clip

          def text_image(
              text,
              width,
              height,
              size,
              color=(255, 255, 255, 255),
              stroke=(0, 0, 0, 255),
              stroke_width=8
          ):
              image = Image.new("RGBA", (width, height), (0, 0, 0, 0))
              draw = ImageDraw.Draw(image)
              current_font = font(size)
              lines = text.split("\n")
              spacing = int(size * 0.25)

              line_sizes = []
              total_height = 0

              for line in lines:
                  box = draw.textbbox(
                      (0, 0),
                      line,
                      font=current_font,
                      stroke_width=stroke_width
                  )
                  line_width = box[2] - box[0]
                  line_height = box[3] - box[1]
                  line_sizes.append((line_width, line_height))
                  total_height += line_height

              total_height += spacing * (len(lines) - 1)
              y = (height - total_height) // 2

              for index, line in enumerate(lines):
                  line_width, line_height = line_sizes[index]
                  x = (width - line_width) // 2
                  line_color = color

                  if line.strip().startswith("#"):
                      line_color = (255, 215, 0, 255)

                  draw.text(
                      (x, y),
                      line,
                      font=current_font,
                      fill=line_color,
                      stroke_width=stroke_width,
                      stroke_fill=stroke
                  )

                  y += line_height + spacing

              return np.array(image)

          def fallback_background(scene):
              base = scene["color"]
              image = Image.new("RGB", (WIDTH, HEIGHT), base)
              draw = ImageDraw.Draw(image)

              for y in range(HEIGHT):
                  factor = y / HEIGHT
                  r = int(base[0] * (0.75 + factor * 0.45))
                  g = int(base[1] * (0.75 + factor * 0.45))
                  b = int(base[2] * (0.75 + factor * 0.45))
                  draw.line((0, y, WIDTH, y), fill=(r, g, b))

              for _ in range(22):
                  x = random.randint(-250, WIDTH)
                  y = random.randint(-250, HEIGHT)
                  radius = random.randint(120, 460)
                  draw.ellipse(
                      (x, y, x + radius, y + radius),
                      outline=(80, 80, 90),
                      width=3
                  )

              path = OUTPUT / f"{scene['id']}_fallback.jpg"
              image.save(path, quality=95)
              return path

          def ensure_profile_image():
              if PROFILE_PNG.exists() and PROFILE_PNG.stat().st_size > 1000:
                  return PROFILE_PNG

              fallback = OUTPUT / "default_profile.png"
              size = 900

              image = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(image)

              draw.ellipse(
                  (30, 30, size - 30, size - 30),
                  fill=(0, 0, 0, 255),
                  outline=(255, 45, 85, 255),
                  width=18
              )

              text = "MC"
              current_font = font(320)
              box = draw.textbbox((0, 0), text, font=current_font)
              text_w = box[2] - box[0]
              text_h = box[3] - box[1]
              x = (size - text_w) // 2
              y = (size - text_h) // 2 - 20

              draw.text((x, y), text, font=current_font, fill=(255, 255, 255, 255))
              image.save(fallback)
              return fallback

          def make_circle_avatar(size=430):
              profile_path = ensure_profile_image()
              img = Image.open(profile_path).convert("RGBA")
              img = ImageOps.fit(
                  img,
                  (size, size),
                  method=RESAMPLE_LANCZOS,
                  centering=(0.5, 0.5)
              )

              mask = Image.new("L", (size, size), 0)
              mask_draw = ImageDraw.Draw(mask)
              mask_draw.ellipse((0, 0, size - 1, size - 1), fill=255)

              avatar = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              avatar.paste(img, (0, 0), mask)

              canvas = Image.new("RGBA", (size + 34, size + 34), (0, 0, 0, 0))
              canvas_draw = ImageDraw.Draw(canvas)

              canvas_draw.ellipse(
                  (4, 4, size + 30, size + 30),
                  fill=(0, 0, 0, 180)
              )

              canvas.paste(avatar, (17, 17), avatar)

              canvas_draw.ellipse(
                  (8, 8, size + 26, size + 26),
                  outline=(255, 45, 85, 255),
                  width=10
              )

              return np.array(canvas)

          def make_check_badge(size=120):
              image = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(image)

              draw.ellipse((4, 4, size - 4, size - 4), fill=(255, 45, 85, 255))
              current_font = font(int(size * 0.52))
              text = "✓"
              box = draw.textbbox((0, 0), text, font=current_font)
              text_w = box[2] - box[0]
              text_h = box[3] - box[1]
              x = (size - text_w) // 2
              y = (size - text_h) // 2 - 6

              draw.text((x, y), text, font=current_font, fill=(255, 255, 255, 255))

              return np.array(image)

          def make_subscribe_box():
              width = 620
              height = 150
              image = Image.new("RGBA", (width, height), (0, 0, 0, 0))
              draw = ImageDraw.Draw(image)

              draw.rectangle((0, 0, width, height), fill=(0, 0, 0, 235))
              current_font = font(88)
              text = "Abonne-toi !"
              box = draw.textbbox((0, 0), text, font=current_font)
              text_w = box[2] - box[0]
              text_h = box[3] - box[1]
              x = (width - text_w) // 2
              y = (height - text_h) // 2 - 8

              draw.text((x, y), text, font=current_font, fill=(255, 255, 255, 255))

              return np.array(image)

          def make_subscribe_outro(last_clip, duration=SUBSCRIBE_OUTRO_DURATION):
              frame = last_clip.get_frame(max(0, last_clip.duration - 0.05))
              bg = ImageClip(frame).set_duration(duration).resize((WIDTH, HEIGHT))

              shade = Image.new("RGBA", (WIDTH, HEIGHT), (0, 0, 0, 70))
              shade_clip = ImageClip(np.array(shade)).set_duration(duration)

              avatar_clip = (
                  ImageClip(make_circle_avatar(430))
                  .set_duration(duration)
                  .set_position(("center", 700))
                  .resize(lambda t: 0.88 + 0.12 * min(1, t / 0.16))
              )

              badge_clip = (
                  ImageClip(make_check_badge(120))
                  .set_duration(duration)
                  .set_position((WIDTH // 2 - 15, 1030))
                  .resize(lambda t: 0.75 + 0.25 * min(1, t / 0.12))
              )

              subscribe_clip = (
                  ImageClip(make_subscribe_box())
                  .set_duration(duration)
                  .set_position(("center", 1195))
                  .resize(lambda t: 0.96 + 0.04 * min(1, t / 0.16))
              )

              return CompositeVideoClip(
                  [bg, shade_clip, avatar_clip, badge_clip, subscribe_clip],
                  size=(WIDTH, HEIGHT)
              ).set_duration(duration)

          def crop_vertical(clip):
              width, height = clip.size
              target_ratio = WIDTH / HEIGHT

              if width / height > target_ratio:
                  new_width = int(height * target_ratio)
                  x1 = int((width - new_width) / 2)
                  clip = clip.crop(
                      x1=x1,
                      y1=0,
                      width=new_width,
                      height=height
                  )
              else:
                  new_height = int(width / target_ratio)
                  y1 = int(max(0, (height - new_height) / 2))
                  clip = clip.crop(
                      x1=0,
                      y1=y1,
                      width=width,
                      height=min(height, new_height)
                  )

              return clip.resize((WIDTH, HEIGHT))

          def make_scene(scene, video_path):
              duration = scene["duration"]

              try:
                  if video_path:
                      base = VideoFileClip(str(video_path)).without_audio()

                      if base.duration < duration:
                          loops = math.ceil(duration / max(base.duration, 0.1))
                          base = concatenate_videoclips([base] * loops)

                      base = base.subclip(0, duration)
                      base = crop_vertical(base)
                  else:
                      raise RuntimeError("No video path")

              except Exception as error:
                  log(f"Using fallback for {scene['id']}: {error}")
                  base = ImageClip(
                      str(fallback_background(scene))
                  ).set_duration(duration).resize((WIDTH, HEIGHT))

              base = base.resize(
                  lambda t: 1.02 + 0.045 * (t / max(duration, 0.1))
              ).crop(
                  x_center=WIDTH / 2,
                  y_center=HEIGHT / 2,
                  width=WIDTH,
                  height=HEIGHT,
              )

              overlays = [base]

              band = Image.new("RGBA", (WIDTH, 360), (0, 0, 0, 120))
              overlays.append(
                  ImageClip(np.array(band))
                  .set_duration(duration)
                  .set_position(("center", HEIGHT - 470))
              )

              title_size = 92

              if "#1" in scene["title"]:
                  title_size = 120

              title_clip = ImageClip(
                  text_image(scene["title"], WIDTH, 360, title_size, stroke_width=10)
              ).set_duration(
                  min(6, duration)
              ).set_position(
                  ("center", 110)
              )

              overlays.append(title_clip)

              if "title2" in scene:
                  title2_clip = ImageClip(
                      text_image(scene["title2"], WIDTH, 260, 72, stroke_width=8)
                  ).set_start(
                      min(5.2, duration * 0.48)
                  ).set_duration(
                      max(0.5, duration - min(5.2, duration * 0.48))
                  ).set_position(
                      ("center", 280)
                  )

                  overlays.append(title2_clip)

              subtitle_clip = ImageClip(
                  text_image(scene["subtitle"], WIDTH - 70, 280, 56, stroke_width=8)
              ).set_duration(
                  duration
              ).set_position(
                  ("center", HEIGHT - 420)
              )

              overlays.append(subtitle_clip)

              return CompositeVideoClip(
                  overlays,
                  size=(WIDTH, HEIGHT)
              ).set_duration(duration)

          def make_music(duration):
              def audio_function(t):
                  t = np.array(t)
                  bass = 0.016 * np.sin(2 * np.pi * 55 * t)
                  pulse = (
                      0.008
                      * np.sin(2 * np.pi * 110 * t)
                      * (0.5 + 0.5 * np.sin(2 * np.pi * 1.15 * t))
                  )
                  air = 0.0025 * np.sin(2 * np.pi * 220 * t)
                  value = bass + pulse + air
                  return np.vstack([value, value]).T if value.ndim else [value, value]

              return AudioClip(audio_function, duration=duration, fps=44100)

          def hit(start, freq=90, duration=0.18, volume=0.10):
              def audio_function(t):
                  t = np.array(t)
                  env = np.exp(-18 * t)
                  value = volume * env * np.sin(2 * np.pi * freq * t)
                  return np.vstack([value, value]).T if value.ndim else [value, value]

              return AudioClip(audio_function, duration=duration, fps=44100).set_start(max(0, start))

          def whoosh(start, duration=0.3, volume=0.035):
              def audio_function(t):
                  t = np.array(t)
                  sweep = np.sin(2 * np.pi * (180 + 650 * t) * t)
                  env = np.sin(np.pi * t / duration)
                  value = volume * sweep * env
                  return np.vstack([value, value]).T if value.ndim else [value, value]

              return AudioClip(audio_function, duration=duration, fps=44100).set_start(max(0, start))

          def ding(start, duration=0.22, volume=0.16):
              def audio_function(t):
                  t = np.array(t)
                  env = np.exp(-14 * t)
                  value = volume * env * (
                      0.75 * np.sin(2 * np.pi * 880 * t) +
                      0.25 * np.sin(2 * np.pi * 1320 * t)
                  )
                  return np.vstack([value, value]).T if value.ndim else [value, value]

              return AudioClip(audio_function, duration=duration, fps=44100).set_start(max(0, start))

          def make_transition_sfx(scene_starts, outro_start):
              sfx = [
                  whoosh(0.00, duration=0.35, volume=0.05),
                  hit(0.18, freq=95, volume=0.10),
              ]

              for index, start in enumerate(scene_starts):
                  if index == 0:
                      sfx.append(hit(start, freq=70, volume=0.16))
                  elif index % 2 == 0:
                      sfx.append(hit(start, freq=100, volume=0.09))
                  else:
                      sfx.append(whoosh(start, duration=0.26, volume=0.030))

              if scene_starts:
                  sfx.append(hit(scene_starts[-1], freq=130, volume=0.08))

              sfx.append(ding(outro_start + 0.08, volume=0.16))

              return sfx

          def main():
              log("Generating Piper voices scene by scene")

              for scene in SCENES:
                  voice_path = generate_scene_voice(scene)
                  voice_clip = AudioFileClip(str(voice_path))
                  voice_duration = voice_clip.duration
                  voice_clip.close()

                  scene["voice_path"] = voice_path
                  scene["duration"] = max(
                      scene["min_duration"],
                      voice_duration + 0.45
                  )

                  log(f"{scene['id']} voice: {voice_duration:.2f}s | scene: {scene['duration']:.2f}s")

              total_duration = COVER_DURATION + sum(scene["duration"] for scene in SCENES) + SUBSCRIBE_OUTRO_DURATION
              log(f"Estimated final duration with cover and outro: {total_duration:.2f}s")

              log("Searching and downloading visuals")
              paths = []

              for scene in SCENES:
                  paths.append(get_scene_video(scene))
                  time.sleep(0.4)

              log("Rendering cover and scenes")

              cover_clip = make_cover_clip(duration=COVER_DURATION)

              scene_clips = [
                  make_scene(scene, path)
                  for scene, path in zip(SCENES, paths)
              ]

              subscribe_outro = make_subscribe_outro(
                  scene_clips[-1],
                  duration=SUBSCRIBE_OUTRO_DURATION
              )

              clips = [cover_clip] + scene_clips + [subscribe_outro]

              final = concatenate_videoclips(clips, method="compose")
              duration = final.duration

              log(f"Video duration: {duration:.2f}s")

              voice_tracks = []
              scene_starts = []
              cursor = COVER_DURATION

              for scene in SCENES:
                  scene_starts.append(cursor)
                  voice_tracks.append(
                      AudioFileClip(str(scene["voice_path"]))
                      .set_start(cursor + 0.10)
                      .fx(volumex, 1.15)
                  )
                  cursor += scene["duration"]

              outro_start = cursor

              music = (
                  make_music(duration)
                  .fx(audio_fadein, 0.4)
                  .fx(audio_fadeout, 1.0)
                  .fx(volumex, 0.30)
              )

              sfx = make_transition_sfx(scene_starts, outro_start)

              audio = CompositeAudioClip([music] + voice_tracks + sfx).set_duration(duration)
              final = final.set_audio(audio)

              log("Exporting MP4")

              final.write_videofile(
                  str(FINAL_MP4),
                  fps=FPS,
                  codec="libx264",
                  audio_codec="aac",
                  bitrate="6500k",
                  threads=4,
                  preset="medium",
              )

              publication = {
                  "titre": "Ces 5 lieux existent… mais presque personne ne peut y entrer",
                  "description_tiktok": "5 lieux réels, protégés pour des raisons scientifiques, historiques ou naturelles. Visuels illustratifs. Voix de synthèse.",
                  "description_youtube_shorts": "Voici 5 endroits réels où l’accès est extrêmement limité : archives, grottes, îles protégées et laboratoire naturel. Visuels illustratifs.",
                  "description_instagram_reels": "Des lieux réels, mais presque inaccessibles. Vous choisiriez lequel… de loin ? Visuels illustratifs.",
                  "hashtags": "#viral #Top5 #LieuxInterdits #FaitsInsolites #CultureGenerale #MysteresDuMonde #LaMinuteCulture",
                  "commentaire_epingle": "Vous visiteriez lequel… si c’était autorisé ?",
                  "mention": "Visuels illustratifs. Voix de synthèse.",
                  "checklist": [
                      "Aucun extrait TikTok, YouTube, Instagram, film, série, TV ou match.",
                      "Aucune musique commerciale connue.",
                      "Aucun logo central volontaire.",
                      "Aucune personne privée identifiable volontaire.",
                      "Voix générée avec Piper TTS français.",
                      "Audio généré scène par scène pour synchroniser voix et visuels.",
                      "Cover automatique générée et exportée en PNG.",
                      "Outro abonnement automatique avec logo, coche et son ding.",
                      "Visuels issus de Pexels, Pixabay ou fonds générés.",
                      "Métadonnées sources conservées dans assets/metadata."
                  ]
              }

              PUBLICATION_JSON.write_text(
                  json.dumps(publication, ensure_ascii=False, indent=2),
                  encoding="utf-8"
              )

              log("Done")

          if __name__ == "__main__":
              main()
          PY

      - name: Generate video
        run: |
          cat > sitecustomize.py <<'PY'
          from PIL import Image
          if not hasattr(Image, "ANTIALIAS"):
              Image.ANTIALIAS = getattr(getattr(Image, "Resampling", Image), "LANCZOS")
          PY

          python --version
          python -c "from PIL import Image; print('ANTIALIAS disponible:', hasattr(Image, 'ANTIALIAS'))"
          PYTHONPATH="$PWD:$PYTHONPATH" python generate_short.py

